<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>캐릭터 난투 모바일 실행</title>
  <style>
    body{margin:0;background:#090c10;color:#fff;font-family:system-ui,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:22px;}
    .card{max-width:420px;background:#171a1f;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:26px} p{color:#b8c1cc;line-height:1.55}
    a,button{display:block;width:100%;box-sizing:border-box;margin-top:12px;padding:14px;border-radius:14px;text-align:center;text-decoration:none;font-weight:900;border:0}
    a.primary{background:#2f8cff;color:white} a.secondary{background:#2a2f38;color:white}
    small{display:block;margin-top:14px;color:#8b95a1;line-height:1.45}
  </style>
</head>
<body>
  <div class="card">
    <h1>캐릭터 난투</h1>
    <p>모바일에서 zip을 풀고 이 파일을 눌렀을 때 바로 볼 수 있는 실행용 파일입니다.</p>
    <a class="primary" href="./offline_demo.html">오프라인 데모 실행</a>
    <a class="secondary" href="./index.html">온라인 앱 열기</a>
    <small>Firebase 온라인 앱은 일부 모바일 브라우저에서 로컬 파일 실행이 막힐 수 있습니다. 그럴 때는 오프라인 데모를 먼저 확인하거나 GitHub Pages에 업로드해서 실행하세요.</small>
  </div>
</body>
</html>
